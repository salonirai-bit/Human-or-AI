<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human or AI — Perception Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&family=Great+Vibes&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="site">
    <div class="container">
        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="screen active">
            <header class="hero">
                <h1 class="display-title">
                    <span class="display-title__script">Human</span>
                    <span class="display-title__serif">or AI</span>
                </h1>
            </header>

            <label class="field-label" for="playerName">Your name</label>
            <input type="text" id="playerName" placeholder="Enter your name" maxlength="20" autocomplete="nickname">
            <button id="startBtn" class="btn-primary">Begin</button>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <div class="player-info">
                    <span id="playerDisplay"></span>
                </div>
                <div class="progress-info">
                    <span id="questionNumber">Question 1/10</span>
                    <span id="timer">45</span>
                </div>
                <div class="score-info">
                    <span id="score">Score: 0</span>
                </div>
            </div>

            <div class="question-container">
                <h2 id="questionTitle"></h2>
                <div id="questionContent"></div>
                <div id="answerButtons" class="answer-buttons"></div>
            </div>
        </div>

        <!-- Explanation Screen -->
        <div id="explanationScreen" class="screen">
            <div class="explanation-container">
                <div id="resultIcon" class="result-icon" role="presentation"></div>
                <h2 id="resultText"></h2>
                <div class="explanation-content">
                    <p id="explanationText"></p>
                </div>
                <button id="nextBtn" class="btn-primary">Next question</button>
            </div>
        </div>

        <!-- Final Screen -->
        <div id="finalScreen" class="screen">
            <header class="hero hero--compact">
                <p class="eyebrow">Session complete</p>
                <h1 class="display-title display-title--small">
                    <span class="display-title__script">Final</span>
                    <span class="display-title__serif">verdict</span>
                </h1>
            </header>

            <div class="final-stats">
                <div class="stat-grid">
                    <div class="stat-card">
                        <span class="stat-value" id="finalScore">0</span>
                        <span class="stat-label">Score</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="accuracy">0%</span>
                        <span class="stat-label">Accuracy</span>
                    </div>
                </div>
            </div>

            <button id="playAgainBtn" class="btn-primary">Play again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
